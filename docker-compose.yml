services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npass
      POSTGRES_DB: n8n_memory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: n8n-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://n8n-skills-agent:5678
    depends_on:
      - n8n

  tunnel-watcher:
    image: alpine:latest
    container_name: n8n-tunnel-watcher
    restart: unless-stopped
    depends_on:
      - cloudflared
    environment:
      - ATLAS_TOKEN=8296459115:AAErBbp8-LVhhontNzKLNwnSpPUHTCL7rtk
      - WEBHOOK_PATH=/webhook/tg-rossell-ai-bot-001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command: >
      -c "
        apk add --no-cache curl docker-cli > /dev/null 2>&1;
        LAST_URL='';
        echo 'Tunnel watcher started';
        while true; do
          TUNNEL_URL=$$(docker logs n8n-cloudflared 2>&1 | grep -o 'https://[a-z0-9-]*\\.trycloudflare\\.com' | tail -1);
          if [ -n \"$$TUNNEL_URL\" ] && [ \"$$TUNNEL_URL\" != \"$$LAST_URL\" ]; then
            FULL_URL=\"$${TUNNEL_URL}$${WEBHOOK_PATH}\";
            echo \"New tunnel URL: $$FULL_URL\";
            RESULT=$$(curl -s \"https://api.telegram.org/bot$${ATLAS_TOKEN}/setWebhook\" --data-urlencode \"url=$$FULL_URL\");
            echo \"Telegram: $$RESULT\";
            LAST_URL=\"$$TUNNEL_URL\";
          fi;
          sleep 15;
        done
      "

  n8n:
    build: .
    container_name: n8n-skills-agent
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5679:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5679/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,os
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_memory
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8npass
    volumes:
      - n8n_data:/home/node/.n8n
      - ${SKILLS_DIR}:/files/skills:ro
      - ${OUTPUT_DIR}:/files/n8n-output

volumes:
  n8n_data:
  postgres_data:
